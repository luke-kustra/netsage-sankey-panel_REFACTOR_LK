name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node version comes from .nvmrc so CI, the docs, and local dev cannot drift apart.
      # It must satisfy both `engines.node` (>=20) and @grafana/plugin-e2e (>=20 <=24).
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      - name: Unit tests
        run: yarn test:ci

      - name: Build
        run: yarn build

      # NOTE: the Playwright suite (`yarn e2e`) is intentionally not run here. It drives a REAL
      # Grafana that already has this plugin loaded (see refactor_notes.md, "How to run the tests"),
      # which CI does not provision. Running it would need a Grafana service container with dist/
      # mounted as an unsigned plugin. Until that exists, e2e stays a local gate.
